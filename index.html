<div>Please be patient when uploading the image and predicting.</div>

      <button class="toggle-button" onclick="toggleWebcam()">Toggle Webcam</button>
      <button class="stop-button" onclick="stopWebcam()" style="display: none;" id="stop-btn">Stop Webcam</button>
    </div>

    <div class="button-group">
      <button onclick="predict()">Predict Breed</button>
      <button class="toggle-button" onclick="captureFromWebcam()">Capture</button>
    </div>

    <div class="content-container">
      <div class="image-section">
        <canvas id="webcam"></canvas>
        <img id="img1"/>
      </div>

      <div class="results-section">
        <h3>Prediction Results</h3>
        <p id="result" style="min-height: 200px;">Select an image, or use your webcam to get started.</p>
      </div>
    </div>
  </div>

    window.onload = async () => {
      model = await tf.loadGraphModel('./model.json');
      console.log('Model loaded');
    };
    const input_button = document.getElementById('input_button');
    input_button.onchange = evt => {
      const [file] = input_button.files;
      if (file) {
        stopWebcam();
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = document.getElementById('img1');
          img.src = e.target.result;
          img.style.display = 'block';
          document.getElementById('webcam').style.display = 'none';
          document.getElementById('result').innerHTML = 'Image loaded. Click "Predict Breed" to analyze.';
        };
        reader.readAsDataURL(file);
      }
    };
    async function toggleWebcam() {
      if (!webcamActive) {
        try {
          webcamStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
          const canvas = document.getElementById('webcam');
          canvas.style.display = 'block';
          document.getElementById('img1').style.display = 'none';

          const video = document.createElement('video');
          video.srcObject = webcamStream;
          video.play();
          videoElement = video;

          const ctx = canvas.getContext('2d');
          const width = 640;
          const height = 480;
          canvas.width = width;
          canvas.height = height;

          function drawFrame() {
            if (webcamActive) {
              ctx.drawImage(video, 0, 0, width, height);
              requestAnimationFrame(drawFrame);
            }
          }

          webcamActive = true;
          document.getElementById('stop-btn').style.display = 'inline-block';
          drawFrame();
          document.getElementById('result').innerHTML = 'Webcam active.';
        } catch (err) {
          alert('Error accessing webcam: ' + err.message);
        }
      } else {
        stopWebcam();
      }
    }

    function stopWebcam() {
      if (webcamStream) {
        webcamStream.getTracks().forEach(track => track.stop());
        webcamStream = null;
        videoElement = null;
        webcamActive = false;
        document.getElementById('webcam').style.display = 'none';
        document.getElementById('stop-btn').style.display = 'none';
      }
    }

    function captureFromWebcam() {
      if (webcamActive) {
        const canvas = document.getElementById('webcam');
        const img = document.getElementById('img1');
        img.src = canvas.toDataURL();
        img.style.display = 'block';
        img.onload = () => {
          predict();
        };
      } else {
        alert('Please activate the webcam first!');
      }
    }

    async function predict() {
      const resultDiv = document.getElementById('result');
      const imgElement = document.getElementById('img1');

      if (!imgElement.src) {
        resultDiv.innerHTML = 'Please select an image first';
        return;
      }

      if (!model) {
        resultDiv.innerHTML = '<span class="loading">Loading doggie model...</span>';
        model = await tf.loadGraphModel('./model.json');
      }

      resultDiv.innerHTML = '<span class="loading">Analyzing image...</span>';

      try {
        let example = tf.browser.fromPixels(imgElement, 3).cast('float32');
        const originalShape = example.shape;
        example = example.reshape([1, originalShape[0], originalShape[1], originalShape[2]]);
        let topResultsArray = ["Oh! This looks like a", "Well, this is for sure a", "This is literally a", "It's a", "o thnk ots a", "You are a", "This is a", "I know it I know it! It's a.. uhh..", "This creature is a", "Ooh! It's a", "I think this is a", "This might be a", "This dog must be a", "Since it has eyes, it must be a", "Is this a", "Now, this creature is a", "This has to be a", "It's him! It's a", "doggie race:", "GENDER FOUND:", "I found the color, it is"]
        let prediction = await model.predict(example);
        let class_scores = await prediction.data();

        const scoreArray = Array.from(class_scores);
        const indexed = scoreArray.map((score, index) => ({ score, index }));
        indexed.sort((a, b) => b.score - a.score);
        const top10 = indexed.slice(0, 10);

        let html = '<div id="topResult"><h3 id="overallTop">' + [topResultsArray[(randomNumber(0, topResultsArray.length - 1))]] + ' ' + classes[top10[0].index] + '!</h3><strong>Top 10 Predictions:</strong><br>';
        top10.forEach((item, rank) => {
          const percentage = (item.score * 100).toFixed(2);
          html += `<div class="prediction-item ${rank === 0 ? 'rank-1' : ''}">
            <span class="prediction-rank">#${rank + 1}</span> - 
            <span class="prediction-breed">${classes[item.index]}</span><br>
            <span class="prediction-score" title="The confidence level, that the image that you provided matches this breed.">Confidence: ${percentage}%</span>
          </div>`;
        });

        html += `<br><strong>Image Dimensions:</strong> ${originalShape[0]}x${originalShape[1]} pixels`;
        html += `<br><strong>Total Classes Analyzed:</strong> ${classes.length}`;

        resultDiv.innerHTML = html;
        example.dispose();
        prediction.dispose();
      } catch (err) {
        resultDiv.innerHTML = 'Error during prediction: ' + err.message;
        console.error(err);
      }
    }
  </script>
